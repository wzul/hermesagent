version: '3.8'

services:
  hermes-agent:
    build: .
    restart: unless-stopped
    depends_on:
      - browserless
    volumes:
      # Persist all sessions, memories, logs, and skills
      - hermes_data:/home/hermes/.hermes
    environment:
      # --- REQUIRED: LLM PROVIDER (Ollama Cloud) ---
      # Defaulting to gemini-3-flash-preview as requested
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://ollama.com/v1}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-gemini-3-flash-preview}
      - HERMES_INFERENCE_PROVIDER=${HERMES_INFERENCE_PROVIDER:-main}
      
      # --- BROWSER SIDECAR CONFIG ---
      # Configure Playwright to use the browserless container instead of local install
      - PLAYWRIGHT_REMOTE_ENDPOINT=ws://browserless:3000
      
      # --- OPTIONAL: MESSAGING PLATFORMS ---
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - TELEGRAM_ALLOWED_USERS=${TELEGRAM_ALLOWED_USERS}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - DISCORD_ALLOWED_USERS=${DISCORD_ALLOWED_USERS}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_APP_TOKEN=${SLACK_APP_TOKEN}
      - SLACK_ALLOWED_USERS=${SLACK_ALLOWED_USERS}
      
      # WhatsApp (requires pairing via 'docker exec -it <container_id> hermes whatsapp')
      - WHATSAPP_ENABLED=${WHATSAPP_ENABLED:-false}
      
      # --- OPTIONAL: TOOLS & FEATURES ---
      - BROWSERBASE_API_KEY=${BROWSERBASE_API_KEY}
      - FAL_KEY=${FAL_KEY}
      - PARALLEL_API_KEY=${PARALLEL_API_KEY}
      - VOICE_TOOLS_OPENAI_KEY=${VOICE_TOOLS_OPENAI_KEY}
      
      # Security: Only allow specific users by default
      - GATEWAY_ALLOW_ALL_USERS=${GATEWAY_ALLOW_ALL_USERS:-false}

  # Playwright Sidecar: Browserless Chrome
  # This container handles all the heavy browser rendering
  browserless:
    image: browserless/chrome:latest
    restart: unless-stopped
    # Port 3000 is used internally by the agent via the service name 'browserless'
    environment:
      - TOKEN=${BROWSERLESS_TOKEN:-}
      - PREBOOT_CHROME=true
      - MAX_CONCURRENT_SESSIONS=5
      - CONNECTION_TIMEOUT=300000

volumes:
  hermes_data:
    driver: local